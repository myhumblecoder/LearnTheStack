services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnthestack
      POSTGRES_PASSWORD: learnthestack
      POSTGRES_DB: learnthestack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnthestack"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      DATABASE_URL: postgresql://learnthestack:learnthestack@db:5432/learnthestack
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
